<p>毕业条件（以下三个都需要满足）：<br />
<strong>1. 课程完成率在 80% 以上：毕业前，学员通过观看直播或录播的形式学习完课程总节数的 80% 即可。例如，学期内一共有 30 节课，上完 24 节课即算完成。<br />
2. 作业提交完成数在 80% 以上：例如，学期内一共布置了 5 次作业，你完成其中的 4 次即可达到毕业条件。<br />
3. 提交毕业总结。</strong></p>
